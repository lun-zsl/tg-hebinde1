<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>云端多群联合采集拉人系统</title>
    <style>
        body { background-color: #1a1a1a; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; background: #262626; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h2 { text-align: center; font-size: 18px; color: #e0e0e0; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .section-title { font-size: 14px; color: #aaa; margin-top: 15px; margin-bottom: 8px; display: flex; align-items: center; }
        input, textarea { width: 100%; padding: 10px; margin-bottom: 12px; background: #333; border: 1px solid #444; border-radius: 4px; color: #fff; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .btn-blue { background-color: #007bff; color: white; }
        .btn-green { background-color: #28a745; color: white; }
        .btn-yellow { background-color: #ffc107; color: #111; } /* 新增：暂停按钮精致黄色 */
        .btn-red { background-color: #dc3545; color: white; }
        .log-panel { background: #000; border: 1px solid #333; padding: 10px; height: 15px; min-height: 150px; font-family: monospace; font-size: 12px; color: #00ff00; overflow-y: auto; white-space: pre-wrap; border-radius: 4px; }
        .flex-box { display: flex; gap: 10px; }
        
        /* 新增：隐藏样式的控制类 */
        .hidden { display: none !important; }
        .login-area { width: 100%; display: flex; flex-direction: column; background: #2d2d2d; padding: 12px; border-radius: 4px; margin-bottom: 12px; border: 1px dashed #555; }
    </style>
</head>
<body>

<div class="container">
    <h2>云端多群联合采集拉人系统 (通用商用版)</h2>
    
    <div class="section-title">🔑 专属开发者凭证配置</div>
    <input type="text" id="api_id" placeholder="API_ID">
    <input type="text" id="api_hash" placeholder="API_HASH">
    <input type="text" id="phone" placeholder="操作账号手机号 (带国家码如 +86...)">
    
    <!-- 发送验证码按钮 -->
    <button class="btn btn-blue" id="send_btn" onclick="sendCode()">⚡ 获取验证码</button>

    <!-- 验证与登录区域：默认隐藏，发送成功后展开 -->
    <div id="login_fields_area" class="login-area hidden">
        <div style="font-size: 12px; color: #ffc107; margin-bottom: 8px;">⚠️ 请检查 Telegram App 接收到的验证代码：</div>
        <input type="text" id="login_code" placeholder="请输入 5 位数字验证码">
        <input type="password" id="password" placeholder="请输入两步验证密码 (若未开启可不填)">
        <button class="btn btn-green" onclick="login()">确认登录连接</button>
    </div>

    <div class="section-title">🎯 拉人任务分配</div>
    <input type="text" id="target_group" placeholder="你的目的地群组链接">
    <input type="number" id="pull_count" placeholder="要拉取的数量" value="100">
    <textarea id="source_groups" rows="3" placeholder="采集群 (一行一个群链接)"></textarea>

    <!-- 升级版控制区域：完美平铺，四档操控 -->
    <div class="flex-box" style="flex-wrap: wrap;">
        <button class="btn btn-green" onclick="startJob()" style="width: 47%; margin-bottom: 8px;">⚠️ 开始运行</button>
        <button class="btn btn-yellow" onclick="controlJob('pause')" style="width: 47%; margin-bottom: 8px;">⏸️ 暂停拉人</button>
        <button class="btn btn-blue" onclick="controlJob('resume')" style="width: 47%;">▶️ 继续拉人</button>
        <button class="btn btn-red" onclick="controlJob('stop')" style="width: 47%;">🛑 强行终止</button>
    </div>

    <div class="section-title">📊 实时监控日志面板:</div>
    <div class="log-panel" id="log_panel">正在准备就绪，等待下达参数指令...</div>
</div>

<script>
    // 自动定时刷新日志
    setInterval(async () => {
        try {
            let res = await fetch('/api/get_logs');
            let data = await res.json();
            let logPanel = document.getElementById('log_panel');
            logPanel.innerText = data.logs;
            logPanel.scrollTop = logPanel.scrollHeight; 
        } catch(e) {}
    }, 2000);

    async function sendCode() {
        let sendBtn = document.getElementById('send_btn');
        sendBtn.innerText = "正在发送中...";
        sendBtn.disabled = true;

        try {
            let res = await fetch('/api/send_code', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    api_id: document.getElementById('api_id').value,
                    api_hash: document.getElementById('api_hash').value,
                    phone: document.getElementById('phone').value
                })
            });
            let data = await res.json();
            
            alert(data.message || "请求已发送");
            document.getElementById('login_fields_area').classList.remove('hidden');
        } catch (error) {
            alert("发送失败，请检查后端服务是否正常运行。");
        } finally {
            sendBtn.innerText = "⚡ 重新发送验证码";
            sendBtn.disabled = false;
        }
    }

    async function login() {
        let res = await fetch('/api/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                phone: document.getElementById('phone').value,
                code: document.getElementById('login_code').value,
                password: document.getElementById('password').value 
            })
        });
        let data = await res.json();
        alert(data.message);
    }

    async function startJob() {
        let res = await fetch('/api/start_job', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                target_group: document.getElementById('target_group').value,
                pull_count: document.getElementById('pull_count').value,
                source_groups: document.getElementById('source_groups').value
            })
        });
        let data = await res.json();
        alert(data.message);
    }

    // 新增：任务调度控制（发送 暂停/恢复/终止 指令给后端）
    async function controlJob(action) {
        try {
            let res = await fetch('/api/control_job', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ action: action })
            });
            let data = await res.json();
            alert(data.message);
        } catch (error) {
            alert("指令下发失败，请确认后端已打上最新修补补丁！");
        }
    }
</script>

</body>
</html>
